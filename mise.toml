[tools]
node = "22.22.3"
go = "1.25.11"

[tasks.dev]
description = "実機テスト用に DB + バックエンド(air) + フロント(LAN公開) を一括起動 (macOS 専用)"
run = "{{config_root}}/dev.sh"

[tasks.gen-api]
description = "openapi.yaml から Go 型を生成"
dir = "api/openapi"
run = "go tool oapi-codegen -config oapi-codegen.config.yaml ../openapi.yaml"

[tasks.test-api]
description = "API の単体テストを実行(結合テストは Skip)"
dir = "api"
run = "go test ./..."

[tasks.test-integration]
description = "API の結合テストを実行(testcontainers / Docker 必須)。Mac/Windows 共通"
dir = "api"
env = { RUN_INTEGRATION = "1" }
run = "go test ./..."

[tasks.build-lambda]
description = "Lambda 用 Go バイナリ(linux/arm64)を infra/dist/api/bootstrap へビルド"
dir = "api"
env = { CGO_ENABLED = "0", GOOS = "linux", GOARCH = "arm64" }
run = "go build -ldflags='-s -w' -o ../infra/dist/api/bootstrap ."

[tasks.build-web]
description = "フロントエンドの本番ビルド(PWA 込み)"
dir = "frontend"
run = "npm ci && npm run build"

[tasks.deploy]
description = "AWS へデプロイ(S3 + CloudFront + Lambda)。初回は infra/README.md の手順を参照"
depends = ["build-lambda", "build-web"]
dir = "infra"
run = "npm ci && npx cdk deploy --require-approval never"
