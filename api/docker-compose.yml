services:
  db:
    image: postgres:17
    container_name: recipe_postgres
    environment:
      POSTGRES_DB: recipe
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
    ports:
      # ホスト側は 5433 に割り当て(他プロジェクトの 5432 と衝突させない)。コンテナ内は 5432 のまま。
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipe"]
      interval: 5s
      timeout: 5s
      retries: 5

  # プロフィール画像のローカル用オブジェクトストレージ(S3 互換)。
  # 本家 MinIO は 2026-04 にアーカイブされたため、メンテ継続中のフォーク pgsty/minio を使う。
  minio:
    image: pgsty/minio:latest
    container_name: recipe_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # ブラウザから署名付き URL へ直 PUT する際の CORS プリフライトを許可する
      #(既定でも "*" だが、フロント直アップロードのために明示する)。
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # 管理コンソール
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 起動時に一度だけ、アバター用バケット作成 + 公開読み取り(<img> 表示用)を設定して終了する。
  minio-init:
    image: pgsty/minio:latest
    container_name: recipe_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/recipe-avatars &&
      mc anonymous set download local/recipe-avatars
      "

volumes:
  pgdata:
  miniodata:
