openapi: 3.0.3
info:
  title: Recipe Management API
  version: 1.0.0
  description: |
    レシピ管理アプリの API 契約。
    本ファイルを契約の単一ソースとし、Go(oapi-codegen)と
    TypeScript(フロント)双方の型を生成する。

servers:
  - url: /
    description: 同一オリジン(dev は Vite proxy で /api を転送、本番はリバースプロキシ)

tags:
  - name: auth
    description: 認証(ログイン・リフレッシュ・登録)
  - name: users
    description: ユーザー
  - name: recipes
    description: レシピ
  - name: labels
    description: ラベル
  - name: shopping-list
    description: 買い物リスト
  - name: share-group
    description: シェアグループ(世帯共有)

paths:
  /api/token/:
    post:
      tags: [auth]
      summary: ログイン(access を body、refresh を httpOnly Cookie で発行)
      description: |
        access を JSON body で返し、refresh は `HttpOnly; Secure; SameSite=Lax` Cookie
        (Path=/api/token/refresh/)でセットする。body に refresh は含めない。
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: 発行成功
          headers:
            Set-Cookie:
              description: 'refresh トークン(HttpOnly; Secure; SameSite=Lax; Path=/api/token/refresh/)'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/token/refresh/:
    post:
      tags: [auth]
      summary: access トークンの再発行(refresh は Cookie から読む)
      description: |
        refresh トークンは body ではなく Cookie から読む。
        Cookie が無い・失効・改竄の場合は 401。
      operationId: refreshToken
      security: []
      responses:
        '200':
          description: 再発行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout/:
    post:
      tags: [auth]
      summary: ログアウト(refresh Cookie を失効させる)
      description: refresh Cookie を Max-Age=0 で上書きして失効させる。
      operationId: logout
      security: []
      responses:
        '204':
          description: 失効成功(本文なし)
          headers:
            Set-Cookie:
              description: 失効した refresh Cookie(Max-Age=0)
              schema:
                type: string

  /api/auth/register/:
    post:
      tags: [auth]
      summary: ユーザー登録
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/user_info/:
    get:
      tags: [users]
      summary: ログイン中ユーザーの情報取得
      operationId: getUserInfo
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [users]
      summary: プロフィール更新(ユーザー名・メール)
      operationId: updateUserInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [users]
      summary: アカウント削除(所有レシピ等も消える)
      operationId: deleteAccount
      responses:
        '204':
          description: 削除成功(本文なし)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user_info/email/:
    put:
      tags: [users]
      summary: メールアドレス変更(現在のパスワード確認あり)
      operationId: changeEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
      responses:
        '200':
          description: 変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/user_info/password/:
    put:
      tags: [users]
      summary: パスワード変更
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: 変更成功(本文なし)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/user_info/avatar/:
    post:
      tags: [users]
      summary: プロフィール画像のアップロード用 URL を発行する
      operationId: createAvatarUploadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAvatarUploadUrlRequest'
      responses:
        '200':
          description: 発行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [users]
      summary: アップロード済みの画像をプロフィール画像として確定する
      operationId: confirmAvatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAvatarRequest'
      responses:
        '200':
          description: 確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [users]
      summary: プロフィール画像を削除する
      operationId: deleteAvatar
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/label/:
    get:
      tags: [labels]
      summary: 自分が管理するラベル一覧
      operationId: listLabels
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LabelItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [labels]
      summary: ラベルを作成する
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelInput'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/label/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        description: ラベル ID
        schema:
          type: string
          format: uuid
    put:
      tags: [labels]
      summary: ラベルを改名する(自分のレシピのラベル名にも伝播)
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelInput'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [labels]
      summary: ラベルを削除する(自分のレシピからも外す)
      operationId: deleteLabel
      responses:
        '204':
          description: 削除成功(本文なし)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/recipes/:
    get:
      tags: [recipes]
      summary: 自分が所有または共有されたレシピ一覧
      operationId: listRecipes
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [recipes]
      summary: レシピ作成
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/ogp/:
    get:
      tags: [recipes]
      summary: 指定 URL の OGP メタデータ(サムネイル画像・タイトル)を取得
      description: |
        外部レシピ URL を貼り付けたときに、サムネイル表示用の og:image と og:title を返す。
        SSRF 対策として http/https のみ・プライベート宛先は拒否する。取得できない項目は空文字。
      operationId: fetchOgp
      parameters:
        - name: url
          in: query
          required: true
          description: OGP を取得する対象の URL
          schema:
            type: string
      responses:
        '200':
          description: 取得成功(項目が無ければ空文字)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OgpResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/recipes/reorder/:
    put:
      tags: [recipes]
      summary: レシピの並び順を更新(ユーザーごと。他ユーザーには影響しない)
      operationId: reorderRecipes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '204':
          description: 更新成功(本文なし)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/recipes/{id}/archive/:
    parameters:
      - name: id
        in: path
        required: true
        description: レシピ ID
        schema:
          type: string
          format: uuid
    put:
      tags: [recipes]
      summary: アーカイブ状態を更新(ユーザーごと。他ユーザーには影響しない)
      operationId: archiveRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveRequest'
      responses:
        '204':
          description: 更新成功(本文なし)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/recipes/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        description: レシピ ID
        schema:
          type: string
          format: uuid
    put:
      tags: [recipes]
      summary: レシピ更新
      operationId: updateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [recipes]
      summary: レシピ削除
      operationId: deleteRecipe
      responses:
        '204':
          description: 削除成功(本文なし)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/shopping_list/:
    get:
      tags: [shopping-list]
      summary: 自分の買い物リストを取得(無ければ作成して返す)
      description: |
        1 ユーザー 1 リストを使い回す。共有されたリストがあればそれを優先して返し、
        無ければ自分が所有するリストを返す。どちらも無ければ空のリストを作成して返す。
      operationId: getShoppingList
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/shopping_list/{id}/items/:
    parameters:
      - name: id
        in: path
        required: true
        description: 買い物リスト ID
        schema:
          type: string
          format: uuid
    post:
      tags: [shopping-list]
      summary: 買い物リストに項目を追加する
      operationId: addShoppingListItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListItemInput'
      responses:
        '200':
          description: 追加成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/shopping_list/{id}/items/bulk/:
    parameters:
      - name: id
        in: path
        required: true
        description: 買い物リスト ID
        schema:
          type: string
          format: uuid
    post:
      tags: [shopping-list]
      summary: 買い物リストに複数項目をまとめて追加する
      description: レシピの材料・調味料などをまとめて追加する。重複はマージせず別行で追加する。
      operationId: addShoppingListItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListBulkAddRequest'
      responses:
        '200':
          description: 追加成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/shopping_list/{id}/items/checked/:
    parameters:
      - name: id
        in: path
        required: true
        description: 買い物リスト ID
        schema:
          type: string
          format: uuid
    delete:
      tags: [shopping-list]
      summary: チェック済みの項目をまとめて削除する
      operationId: clearCheckedShoppingListItems
      responses:
        '200':
          description: 削除成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/shopping_list/{id}/items/reorder/:
    parameters:
      - name: id
        in: path
        required: true
        description: 買い物リスト ID
        schema:
          type: string
          format: uuid
    put:
      tags: [shopping-list]
      summary: 項目の並び順を更新する(共有相手全員に反映)
      operationId: reorderShoppingListItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListReorderRequest'
      responses:
        '200':
          description: 更新成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/shopping_list/{id}/items/{item_id}/:
    parameters:
      - name: id
        in: path
        required: true
        description: 買い物リスト ID
        schema:
          type: string
          format: uuid
      - name: item_id
        in: path
        required: true
        description: 項目 ID
        schema:
          type: string
          format: uuid
    put:
      tags: [shopping-list]
      summary: 項目のチェック状態を更新する
      operationId: updateShoppingListItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingListItemUpdateRequest'
      responses:
        '200':
          description: 更新成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [shopping-list]
      summary: 項目を削除する
      operationId: deleteShoppingListItem
      responses:
        '200':
          description: 削除成功(更新後のリスト全体を返す)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/share_group/:
    get:
      tags: [share-group]
      summary: 自分が所属するシェアグループを取得する
      description: グループ未所属のときは 404 を返す。
      operationId: getShareGroup
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareGroupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [share-group]
      summary: シェアグループを作成する(作成者が所有者になる)
      operationId: createShareGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareGroupRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/share_group/join/:
    post:
      tags: [share-group]
      summary: 招待コードでシェアグループに参加する
      operationId: joinShareGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinShareGroupRequest'
      responses:
        '200':
          description: 参加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/share_group/leave/:
    post:
      tags: [share-group]
      summary: シェアグループを抜ける(所有者が抜けると解散)
      operationId: leaveShareGroup
      responses:
        '204':
          description: 成功(本文なし)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/share_group/invite_code/:
    post:
      tags: [share-group]
      summary: 招待コードを再発行する(所有者のみ。旧コードは失効)
      operationId: regenerateInviteCode
      responses:
        '200':
          description: 再発行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareGroupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/share_group/shopping_list_sharing/:
    put:
      tags: [share-group]
      summary: 自分の買い物リストのグループ統合設定を切り替える
      operationId: updateShoppingListSharing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShoppingListSharingRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareGroupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/share_group/members/{user_id}/:
    parameters:
      - name: user_id
        in: path
        required: true
        description: 外すメンバーのユーザー ID
        schema:
          type: string
          format: uuid
    delete:
      tags: [share-group]
      summary: メンバーを外す(所有者のみ)
      operationId: removeShareGroupMember
      responses:
        '204':
          description: 成功(本文なし)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Authorization: Bearer <access_token>。
        refresh トークンの Cookie 化は別途対応予定。

  responses:
    BadRequest:
      description: リクエスト不正・バリデーション失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: 未認証・トークン無効/期限切れ・クレデンシャル不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 権限なし(他ユーザーのレシピ操作など)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 対象が存在しない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 既に存在する(ユーザー名・メール重複)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # 注: x-go-* / x-oapi-codegen-extra-tags は Go 生成のための拡張で、
    # 他ツール(フロントの生成器)では無視される。生成型を現行の手書き DTO と
    # 一致させ、ハンドラ/サービスを無改修のまま単一ソース化するために用いる。
    Error:
      type: object
      description: Echo の既定エラー形式
      required: [message]
      properties:
        message:
          type: string
          example: not found

    TokenRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          x-go-type: string
          x-oapi-codegen-extra-tags:
            validate: required,email
        password:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required

    TokenResponse:
      type: object
      description: refresh は body に含めず Cookie で発行する
      required: [access]
      properties:
        access:
          type: string

    RefreshResponse:
      type: object
      required: [access]
      properties:
        access:
          type: string

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          maxLength: 50
          x-oapi-codegen-extra-tags:
            validate: required,max=50
        email:
          type: string
          format: email
          maxLength: 50
          x-go-type: string
          x-oapi-codegen-extra-tags:
            validate: required,email,max=50
        password:
          type: string
          minLength: 8
          x-oapi-codegen-extra-tags:
            validate: required,min=8

    UserInfoResponse:
      type: object
      required: [id, username, email, created_at, avatar_url]
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        username:
          type: string
        email:
          type: string
        created_at:
          type: string
          description: 登録日時(JST, "YYYY-MM-DD HH:MM")
        avatar_url:
          type: string
          nullable: true
          description: プロフィール画像の URL。未設定なら null。

    CreateAvatarUploadUrlRequest:
      type: object
      required: [content_type]
      properties:
        content_type:
          type: string
          enum: [image/jpeg, image/png, image/webp]
          x-oapi-codegen-extra-tags:
            validate: required,oneof=image/jpeg image/png image/webp

    AvatarUploadUrlResponse:
      type: object
      description: アップロード先の署名付き URL。この URL へ画像本体を PUT する(Content-Type ヘッダは要求時と同じ値にする)。
      required: [upload_url, key]
      properties:
        upload_url:
          type: string
        key:
          type: string
          description: アップロード後、確定(PUT /api/user_info/avatar/)に渡すオブジェクトキー。

    ConfirmAvatarRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required

    UpdateUserRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          maxLength: 50
          x-oapi-codegen-extra-tags:
            validate: required,max=50

    ChangeEmailRequest:
      type: object
      description: メールアドレス変更。本人確認のため現在のパスワードを要求する。
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 50
          x-go-type: string
          x-oapi-codegen-extra-tags:
            validate: required,email,max=50
        password:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required
        new_password:
          type: string
          minLength: 8
          x-oapi-codegen-extra-tags:
            validate: required,min=8

    UserListItem:
      type: object
      required: [id, username, avatar_url]
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        username:
          type: string
        avatar_url:
          type: string
          nullable: true
          description: プロフィール画像の URL。未設定なら null。

    LabelResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string

    LabelItem:
      type: object
      description: ユーザーが管理するラベル(マスタ)。作成・改名・削除の対象。
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
          x-go-type: string
        name:
          type: string

    NameInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required

    LabelInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required

    CookingInput:
      type: object
      required: [ingredients, quantity, unit]
      properties:
        ingredients:
          $ref: '#/components/schemas/NameInput'
        quantity:
          type: number
          format: double
        unit:
          type: string

    SeasonInput:
      type: object
      required: [seasoning, quantity, unit]
      properties:
        seasoning:
          $ref: '#/components/schemas/NameInput'
        quantity:
          type: number
          format: double
        unit:
          type: string

    RecipeRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required
        create_time:
          type: integer
          nullable: true
          description: 調理時間(分)。任意。
        create_for:
          type: integer
          description: 何人前。未指定時はサーバ側で 1 に正規化される。
          x-go-type-skip-optional-pointer: true
        procedure:
          type: string
          x-go-type-skip-optional-pointer: true
        source_url:
          type: string
          description: 参考にした外部レシピの URL。任意。空文字で未設定。
          x-go-type-skip-optional-pointer: true
        thumbnail_url:
          type: string
          description: source_url の OGP 画像 URL(サムネイル)。任意。空文字で未設定。
          x-go-type-skip-optional-pointer: true
        label:
          type: array
          items:
            $ref: '#/components/schemas/LabelInput'
          x-go-type-skip-optional-pointer: true
        cooking:
          type: array
          items:
            $ref: '#/components/schemas/CookingInput'
          x-go-type-skip-optional-pointer: true
        season:
          type: array
          items:
            $ref: '#/components/schemas/SeasonInput'
          x-go-type-skip-optional-pointer: true

    ArchiveRequest:
      type: object
      description: アーカイブ状態(ユーザーごと)。true でアーカイブ、false で解除。
      required: [archive_flg]
      properties:
        # boolean に validate:required は付けない(false=解除 がゼロ値扱いで弾かれるため)。
        archive_flg:
          type: boolean
          x-go-type-skip-optional-pointer: true

    ReorderRequest:
      type: object
      description: 表示したい順にレシピ ID を並べた配列(先頭 = 一番上)
      required: [recipe_ids]
      properties:
        recipe_ids:
          type: array
          items:
            type: string
            format: uuid
            x-go-type: string
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            validate: required,dive,uuid

    OgpResponse:
      type: object
      required: [image, title]
      properties:
        image:
          type: string
          description: og:image の URL。取得できなければ空文字。
        title:
          type: string
          description: og:title。取得できなければ空文字。

    NameResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CookingResponse:
      type: object
      required: [ingredients, quantity, unit]
      properties:
        ingredients:
          $ref: '#/components/schemas/NameResponse'
        quantity:
          type: number
          format: double
        unit:
          type: string

    SeasonResponse:
      type: object
      required: [seasoning, quantity, unit]
      properties:
        seasoning:
          $ref: '#/components/schemas/NameResponse'
        quantity:
          type: number
          format: double
        unit:
          type: string

    RecipeResponse:
      type: object
      required:
        - id
        - created_at
        - updated_at
        - cooking
        - season
        - procedure
        - owner
        - shared_user
        - title
        - create_time
        - create_for
        - archive_flg
        - label
        - source_url
        - thumbnail_url
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        created_at:
          type: string
          description: 'JST。形式: YYYY-MM-DD HH:mm'
          example: '2026-06-15 09:30'
        updated_at:
          type: string
          description: 'JST。形式: YYYY-MM-DD HH:mm'
          example: '2026-06-15 09:30'
        cooking:
          type: array
          items:
            $ref: '#/components/schemas/CookingResponse'
        season:
          type: array
          items:
            $ref: '#/components/schemas/SeasonResponse'
        procedure:
          type: string
        source_url:
          type: string
          description: 参考にした外部レシピの URL。未設定時は空文字。
        thumbnail_url:
          type: string
          description: source_url の OGP 画像 URL(サムネイル)。未設定時は空文字。
        owner:
          $ref: '#/components/schemas/UserListItem'
        shared_user:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'
        title:
          type: string
        create_time:
          type: integer
          nullable: true
          description: 調理時間(分)。任意。null 可。
        create_for:
          type: integer
        archive_flg:
          type: boolean
        label:
          type: array
          items:
            $ref: '#/components/schemas/LabelResponse'

    ShoppingListItemInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 50
          x-oapi-codegen-extra-tags:
            validate: required,max=50

    ShoppingListBulkAddItem:
      type: object
      description: 一括追加する 1 項目。数量・単位は任意(レシピから追加するとき付く)。
      required: [name]
      properties:
        name:
          type: string
          maxLength: 50
          x-oapi-codegen-extra-tags:
            validate: required,max=50
        quantity:
          type: number
          format: double
          nullable: true
        unit:
          type: string
          maxLength: 10
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            validate: max=10

    ShoppingListBulkAddRequest:
      type: object
      description: 買い物リストへ複数項目をまとめて追加する。重複はマージせず別行で追加する。
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ShoppingListBulkAddItem'
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            validate: required,min=1,dive

    ShoppingListItemUpdateRequest:
      type: object
      description: 項目のチェック状態。true でチェック済み、false で未チェック。
      required: [checked]
      properties:
        # boolean に validate:required は付けない(false がゼロ値扱いで弾かれるため)。
        checked:
          type: boolean
          x-go-type-skip-optional-pointer: true

    ShoppingListReorderRequest:
      type: object
      description: 表示したい順に項目 ID を並べた配列(先頭 = 一番上)
      required: [item_ids]
      properties:
        item_ids:
          type: array
          items:
            type: string
            format: uuid
            x-go-type: string
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            validate: required,dive,uuid

    ShoppingListItemResponse:
      type: object
      required: [id, name, unit, checked]
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        name:
          type: string
        quantity:
          type: number
          format: double
          nullable: true
          description: レシピから追加した項目の数量。手動追加した項目は null。
        unit:
          type: string
          description: 数量の単位(例 ml、個)。数量が無い項目は空文字。
          x-go-type-skip-optional-pointer: true
        checked:
          type: boolean

    ShoppingListResponse:
      type: object
      description: 買い物リスト。項目はチェック済みが末尾、同グループ内は追加順。
      required: [id, owner, shared_user, items]
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        owner:
          $ref: '#/components/schemas/UserListItem'
        shared_user:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingListItemResponse'

    CreateShareGroupRequest:
      type: object
      description: グループ作成。name は任意(空なら既定名)。
      properties:
        name:
          type: string
          maxLength: 50
          x-go-type-skip-optional-pointer: true
          x-oapi-codegen-extra-tags:
            validate: max=50

    JoinShareGroupRequest:
      type: object
      required: [invite_code, share_shopping_list]
      properties:
        invite_code:
          type: string
          x-oapi-codegen-extra-tags:
            validate: required
        share_shopping_list:
          type: boolean
          description: >-
            true ならグループの買い物リストへ統合する(自分の個人リストは物理削除される)。
            false なら個人の買い物リストを維持する(グループの共有リストは見えない)。
          x-go-type-skip-optional-pointer: true

    UpdateShoppingListSharingRequest:
      type: object
      required: [share_shopping_list]
      properties:
        share_shopping_list:
          type: boolean
          description: >-
            true にすると買い物リストをグループへ統合する(自分の個人リストは物理削除される)。
            false にすると個人運用に戻す(次回アクセス時に新規の空リストができる)。
          x-go-type-skip-optional-pointer: true

    ShareGroupResponse:
      type: object
      description: >-
        シェアグループ。members は所有者を含む全メンバー。is_owner は取得ユーザーが所有者か。
        share_shopping_list は取得ユーザー自身の買い物リスト統合設定。
      required:
        [id, name, owner, members, invite_code, invite_code_expires_at, is_owner, share_shopping_list]
      properties:
        id:
          type: string
          format: uuid
          x-go-name: ID
          x-go-type: string
        name:
          type: string
        owner:
          $ref: '#/components/schemas/UserListItem'
        members:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'
        invite_code:
          type: string
        invite_code_expires_at:
          type: string
          description: 'JST。形式: YYYY-MM-DD HH:mm'
        is_owner:
          type: boolean
        share_shopping_list:
          type: boolean

security:
  - bearerAuth: []
